<!DOCTYPE html>
<html>
<body>
    <h2>KFC AI Nutrition Check</h2>
    <input type="text" id="customerId" placeholder="Nhập ID khách hàng">
    <button onclick="sendData()">Kiểm tra</button>
    <p id="result"></p>

    <script>
        async function sendData() {
            const id = document.getElementById("customerId").value;
            try {
                const response = await fetch("https://linhngoc.app.n8n.cloud/webhook/check-allergy", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ customerId: id })
                });
                const data = await response.json();
                document.getElementById("result").innerText = JSON.stringify(data);
            } catch (error) {
                document.getElementById("result").innerText = "Lỗi kết nối: " + error.message;
            }
        }
    </script>
</body>
</html>
