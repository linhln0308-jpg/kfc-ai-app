<!DOCTYPE html>
<html>
<body>
    <h2>KFC AI Nutrition Check</h2>
    <select id="customerId"><option>Đang tải...</option></select>
    <button onclick="checkData()">Kiểm tra</button>
    <div id="result"></div>

    <script>
        const WEBHOOK_URL = "https://linhngoc.app.n8n.cloud/webhook/check-allergy";

        // Tự động tải danh sách khách hàng từ n8n
        fetch(WEBHOOK_URL, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ action: "getList" }) })
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById("customerId");
                select.innerHTML = data.map(c => `<option value="${c.customer_id}">${c.name}</option>`).join('');
            });

        async function checkData() {
            const res = await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ action: "check", customerId: document.getElementById("customerId").value })
            });
            const data = await res.json();
            document.getElementById("result").innerText = data.message;
        }
    </script>
</body>
</html>
